apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: argocd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      containers:
      - name: gitea
        image: gitea/gitea:latest
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: gitea-service
  namespace: argocd
spec:
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: gitea