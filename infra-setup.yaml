apiVersion: v1
kind: Namespace
metadata:
  name: mlflow
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: s3-mock
  namespace: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s3-mock
  template:
    metadata:
      labels:
        app: s3-mock
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args: ["server", "/data"]
        env:
        - name: MINIO_ROOT_USER
          value: "mock_aws_access_key"
        - name: MINIO_ROOT_PASSWORD
          value: "mock_aws_secret_key"
        ports:
        - containerPort: 9000
---
apiVersion: v1
kind: Service
metadata:
  name: s3-service
  namespace: mlflow
spec:
  ports:
  - port: 9000
    targetPort: 9000
  selector:
    app: s3-mock
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow-tracking
  namespace: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.11.3
        command: ["mlflow", "server", "--host", "0.0.0.0", "--default-artifact-root", "s3://mlflow-bucket/"]
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "mock_aws_access_key"
        - name: AWS_SECRET_ACCESS_KEY
          value: "mock_aws_secret_key"
        - name: MLFLOW_S3_ENDPOINT_URL
          value: "http://s3-service.mlflow.svc.cluster.local:9000"
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: mlflow
spec:
  ports:
  - port: 5000
    targetPort: 5000
  selector:
    app: mlflow
