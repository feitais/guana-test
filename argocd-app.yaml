apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-pipeline
  namespace: argocd
spec:
  project: default
  source:
    
    repoURL: 'https://github.com/YOUR_USERNAME/YOUR_REPO.git'
    targetRevision: HEAD
    path: 'apps' # Path to your job.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: mlflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true